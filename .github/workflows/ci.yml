name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r requirements.txt

    - name: Verify all imports
      run: |
        python -c "
        import importlib, pathlib
        failed = []
        for f in sorted(pathlib.Path('quickprs').rglob('*.py')):
            if f.stem.startswith('__'): continue
            mod = '.'.join(f.relative_to('.').with_suffix('').parts)
            try:
                importlib.import_module(mod)
            except Exception as e:
                failed.append((mod, str(e)))
        if failed:
            for m, e in failed: print(f'FAIL: {m}: {e}')
            exit(1)
        print(f'All modules import OK')
        "

    - name: Run tests
      run: |
        python -m pytest tests/ -q --tb=short -x
