# QuickPRS Config — Scanner/Monitor Radio
# A monitoring-only radio with two P25 systems and NOAA weather.

[personality]
name = SCANNER.PRS
author = QuickPRS

[system.KCSO]
type = p25_trunked
long_name = KING CO SHERIFF
system_id = 1100
wacn = 781824
iden_base = 851012500
iden_spacing = 12500

[system.KCSO.frequencies]
1 = 851.2125,806.2125
2 = 851.2375,806.2375
3 = 851.2625,806.2625

[system.KCSO.talkgroups]
1 = 100,KCSO DP,KCSO Dispatch
2 = 101,KCSO T1,KCSO Tac 1
3 = 102,KCSO T2,KCSO Tac 2

[system.SPD]
type = p25_trunked
long_name = SEATTLE PD
system_id = 892
wacn = 781824
iden_base = 851012500
iden_spacing = 12500

[system.SPD.frequencies]
1 = 851.0125,806.0125
2 = 851.0375,806.0375
3 = 851.0625,806.0625
4 = 851.0875,806.0875

[system.SPD.talkgroups]
1 = 1,SPD DSP,SPD Dispatch
2 = 2,SPD TAC,SPD Tactical
3 = 3,SPD TRF,SPD Traffic

[channels.NOAA]
template = noaa
