# QuickPRS Config — Patrol Radio
# A realistic patrol officer radio with P25 trunked dispatch,
# MURS simplex channels, and NOAA weather.

[personality]
name = PATROL RADIO.PRS
author = QuickPRS

[system.PSERN]
type = p25_trunked
long_name = PSERN SEATTLE
system_id = 892
wacn = 781824
iden_base = 851012500
iden_spacing = 12500

[system.PSERN.frequencies]
# tx_freq,rx_freq
1 = 851.0125,806.0125
2 = 851.0375,806.0375
3 = 851.0625,806.0625
4 = 851.0875,806.0875
5 = 851.1125,806.1125

[system.PSERN.talkgroups]
# id,short_name,long_name
1 = 1,DISP N,Dispatch North
2 = 2,DISP S,Dispatch South
3 = 3,TAC 1,Tactical 1
4 = 10,FIRE D,Fire Dispatch
5 = 20,EMS,EMS Operations

[channels.MURS]
template = murs

[channels.NOAA]
template = noaa

[channels.CUSTOM]
# short_name,tx_freq,rx_freq,tx_tone,rx_tone,long_name
1 = CH 1,462.5625,462.5625,100.0,100.0,Custom Ch 1
2 = CH 2,462.5875,467.5875,,,Custom Ch 2
